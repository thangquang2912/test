name: CI/CD - 5 Bước Kiểm Thử & Đóng Gói (Zen TaskFlow Pro)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: 🚀 Quy trình CI/CD 5 Bước
    runs-on: ubuntu-latest

    steps:
      # ==========================================
      # BƯỚC 1: Checkout mã nguồn từ kho lưu trữ
      # ==========================================
      - name: 📦 Bước 1 - Checkout mã nguồn (Checkout Code)
        uses: actions/checkout@v4

      # ==========================================
      # BƯỚC 2: Thiết lập môi trường Node.js & Cache
      # ==========================================
      - name: ⚙️ Bước 2 - Thiết lập Node.js & Caching (Setup Node.js)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ==========================================
      # BƯỚC 3: Cài đặt các gói phụ thuộc (Dependencies)
      # ==========================================
      - name: 📥 Bước 3 - Cài đặt Dependencies (Install Dependencies)
        run: npm ci

      # ==========================================
      # BƯỚC 4: Kiểm tra chất lượng mã & Chạy Unit Test
      # ==========================================
      - name: 🧪 Bước 4 - Chạy Kiểm thử & Lint code (Lint & Run Unit Tests)
        run: |
          echo "::: Đang kiểm tra linter..."
          npm run lint
          echo "::: Đang chạy bộ Unit Test với Vitest..."
          npm run test

      # ==========================================
      # BƯỚC 5: Đóng gói bản dựng & Upload Artifact
      # ==========================================
      - name: 🏗️ Bước 5 - Đóng gói bản dựng & Upload Artifact (Build & Upload)
        run: npm run build

      - name: 📤 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zen-taskflow-pro-dist
          path: dist/
          retention-days: 7
